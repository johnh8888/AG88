name: A股短线选股系统

on:
  schedule:
    - cron: '30 1 * * 1-5'     # 周一到周五 北京时间早上9:30左右（UTC+8）
  workflow_dispatch:           # 支持手动触发

jobs:
  run-selector:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install efinance pandas numpy requests openpyxl

      - name: 运行选股脚本
        env:
          # 如果后续需要其他密钥，可在这里添加
          PYTHONIOENCODING: utf-8
        run: python stock_recommender_conservative_v2.py

      - name: 上传选股结果
        uses: actions/upload-artifact@v4
        with:
          name: selected-stocks
          path: |
            selected_stocks.csv
            last_spot_snapshot.csv