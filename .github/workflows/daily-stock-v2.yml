# .github/workflows/stock_selector.yml
name: A股短线选股系统 V3.0

on:
  schedule:
    # UTC 01:35 = 北京时间 09:35（周一至周五）
    - cron: "35 1 * * 1-5"
  workflow_dispatch:

jobs:
  stock-selection:
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"
      TZ: "Asia/Shanghai"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple \
            akshare efinance pandas numpy requests tenacity scipy

      - name: Run strategy (with retry)
        run: |
          set -e
          for i in 1 2 3; do
            echo "Attempt $i running..."
            python stock_selector_v4.py && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Validate output
        run: |
          echo "===== FILES ====="
          ls -lh
          if [ ! -f selected_stocks.csv ]; then
            echo "ERROR: selected_stocks.csv not found"
            exit 1
          fi
          echo "===== SELECTED STOCKS ====="
          cat selected_stocks.csv

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stock-results
          path: |
            selected_stocks.csv
            last_spot_snapshot.csv
          retention-days: 14

      - name: Save logs
        if: always()
        run: |
          mkdir -p logs
          echo "Run time: $(date)" > logs/run.log
          echo "Status: $?" >> logs/run.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
          retention-days: 30
