name: A股短线选股系统 V3.0

于:
  schedule:
    # 北京时间 09:35 = UTC 01:35
    - cron: "35 1 * * 1-5"

  workflow_dispatch:

jobs:
  stock-selection:
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"
      TEST_MODE: "0"

    steps:
      # =====================
      # 1. 拉代码
      # =====================
      - name: Checkout
        uses: actions/checkout@v4

      # =====================
      # 2. Python环境
      # =====================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # =====================
      # 3. 依赖安装（稳定版）
      # =====================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple \
            akshare efinance pandas numpy requests tenacity

      # =====================
      # 4. 运行脚本（带重试）
      # =====================
      - name: Run stock selection (retry safe)
        run: |
          for i in 1 2 3; do
            echo "Run attempt $i"
            python stock_recommender_conservative_v2.py && break
            echo "Failed attempt $i, retrying..."
            sleep 10
          done

      # =====================
      # 5. 结果检查
      # =====================
      - name: Check output
        run: |
          echo "===== FILE LIST ====="
          ls -lh

          if [ ! -f selected_stocks.csv ]; then
            echo "❌ No output generated"
            exit 1
          fi

          echo "===== RESULTS ====="
          cat selected_stocks.csv

      # =====================
      # 6. 上传结果
      # =====================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stock-results
          path: |
            selected_stocks.csv
            last_spot_snapshot.csv
          retention-days: 14

      # =====================
      # 7. 保存运行日志
      # =====================
      - name: Save logs
        if: always()
        run: |
          mkdir -p logs
          echo "Run time: $(date)" > logs/run.log
          echo "Status: $?" >> logs/run.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
          retention-days: 30
