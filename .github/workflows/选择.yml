name: V15 Quant System

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies (safe mode)
        run: |
          pip install -r requirements.txt || true
          pip install lightgbm xgboost --no-cache-dir || true

      - name: Run system
        run: |
          python run.py