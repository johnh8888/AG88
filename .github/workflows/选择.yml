name: V15 Stable Quant System

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas numpy requests

      - name: Run with retry protection
        run: |
          for i in 1 2 3; do
            python run.py && break || sleep 10
          done